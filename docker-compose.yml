services:
  nats:
    image: nats:2.10-alpine
    command: ["-js", "-m", "8222", "-sd", "/data"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats-data:/data

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_DB: otel
      CLICKHOUSE_USER: otel
      CLICKHOUSE_PASSWORD: otel
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./scripts/clickhouse_schema.sql:/docker-entrypoint-initdb.d/01-otel-schema.sql:ro

  jetstream-init:
    image: natsio/nats-box:0.16.0
    depends_on:
      - nats
    restart: "no"
    entrypoint: /bin/sh
    command:
      - -c
      - |
        until nats --server nats://nats:4222 stream ls >/dev/null 2>&1; do
          sleep 1
        done

        if nats --server nats://nats:4222 stream info OTEL_TELEMETRY >/dev/null 2>&1; then
          echo "Stream OTEL_TELEMETRY already exists; skipping creation"
          exit 0
        fi

        nats --server nats://nats:4222 stream add OTEL_TELEMETRY \
          --subjects "otel.traces,otel.metrics,otel.logs" \
          --storage file \
          --retention limits \
          --max-age 24h \
          --defaults

  otlp-gateway:
    build:
      context: .
      dockerfile: Dockerfile
      target: gateway
    depends_on:
      nats:
        condition: service_started
      jetstream-init:
        condition: service_completed_successfully
    ports:
      - "4320:4320"
    volumes:
      - ./configs/gateway.yaml:/etc/otel-pipeline/gateway.yaml:ro
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: "otel-collector:4317"
      OTEL_EXPORTER_OTLP_INSECURE: "true"
      OTEL_SERVICE_NAME: otlp-gateway
      OTEL_RESOURCE_ATTRIBUTES: service.namespace=otel-telemetry-pipeline

  jetstream-clickhouse-loader:
    build:
      context: .
      dockerfile: Dockerfile
      target: loader
    depends_on:
      nats:
        condition: service_started
      jetstream-init:
        condition: service_completed_successfully
      clickhouse:
        condition: service_started
    volumes:
      - ./configs/loader.yaml:/etc/otel-pipeline/loader.yaml:ro
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: "otel-collector:4317"
      OTEL_EXPORTER_OTLP_INSECURE: "true"
      OTEL_SERVICE_NAME: jetstream-clickhouse-loader
      OTEL_RESOURCE_ATTRIBUTES: service.namespace=otel-telemetry-pipeline

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.104.0
    depends_on:
      - otlp-gateway
      - hyperdx
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./configs/otel-collector.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317:4317"
      - "8888:8888"

  hyperdx:
    image: hyperdx/hyperdx-local:latest
    depends_on:
      - clickhouse
    environment:
      HYPERDX_LOG_LEVEL: "0"
      FRONTEND_URL: "http://localhost:8090"
      CLICKHOUSE_ENDPOINT: "tcp://clickhouse:9000?dial_timeout=10s"
      HYPERDX_OTEL_EXPORTER_CLICKHOUSE_DATABASE: "otel"
      DEFAULT_CONNECTIONS: '[{"name":"Pipeline ClickHouse","host":"http://localhost:8123","username":"otel","password":"otel"}]'
      DEFAULT_SOURCES: '[{"from":{"databaseName":"otel","tableName":"otel_logs"},"kind":"log","timestampValueExpression":"TimestampTime","name":"Logs","displayedTimestampValueExpression":"Timestamp","implicitColumnExpression":"Body","serviceNameExpression":"ServiceName","bodyExpression":"Body","eventAttributesExpression":"LogAttributes","resourceAttributesExpression":"ResourceAttributes","defaultTableSelectExpression":"Timestamp,ServiceName,SeverityText,Body","severityTextExpression":"SeverityText","traceIdExpression":"TraceId","spanIdExpression":"SpanId","connection":"Pipeline ClickHouse","traceSourceId":"Traces","sessionSourceId":"Sessions","metricSourceId":"Metrics"},{"from":{"databaseName":"otel","tableName":"otel_traces"},"kind":"trace","timestampValueExpression":"Timestamp","name":"Traces","displayedTimestampValueExpression":"Timestamp","implicitColumnExpression":"SpanName","serviceNameExpression":"ServiceName","eventAttributesExpression":"SpanAttributes","resourceAttributesExpression":"ResourceAttributes","defaultTableSelectExpression":"Timestamp,ServiceName,StatusCode,round(Duration/1e6),SpanName","traceIdExpression":"TraceId","spanIdExpression":"SpanId","durationExpression":"Duration","durationPrecision":9,"parentSpanIdExpression":"ParentSpanId","spanNameExpression":"SpanName","spanKindExpression":"SpanKind","statusCodeExpression":"StatusCode","statusMessageExpression":"StatusMessage","connection":"Pipeline ClickHouse","logSourceId":"Logs","sessionSourceId":"Sessions","metricSourceId":"Metrics"},{"from":{"databaseName":"otel","tableName":""},"kind":"metric","timestampValueExpression":"TimeUnix","name":"Metrics","resourceAttributesExpression":"ResourceAttributes","metricTables":{"gauge":"otel_metrics_gauge","histogram":"otel_metrics_histogram","sum":"otel_metrics_sum","summary":"otel_metrics_summary","exponentialHistogram":"otel_metrics_exponentialhistogram"},"connection":"Pipeline ClickHouse","logSourceId":"Logs","traceSourceId":"Traces","sessionSourceId":"Sessions"},{"from":{"databaseName":"otel","tableName":"hyperdx_sessions"},"kind":"session","timestampValueExpression":"TimestampTime","name":"Sessions","displayedTimestampValueExpression":"Timestamp","implicitColumnExpression":"Body","serviceNameExpression":"ServiceName","bodyExpression":"Body","eventAttributesExpression":"LogAttributes","resourceAttributesExpression":"ResourceAttributes","defaultTableSelectExpression":"Timestamp,ServiceName,SeverityText,Body","severityTextExpression":"SeverityText","traceIdExpression":"TraceId","spanIdExpression":"SpanId","connection":"Pipeline ClickHouse","logSourceId":"Logs","traceSourceId":"Traces","metricSourceId":"Metrics"}]'
    ports:
      - "8090:8080"


  grafana:
    image: grafana/grafana:11.1.4
    depends_on:
      - clickhouse
    environment:
      GF_INSTALL_PLUGINS: grafana-clickhouse-datasource
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./configs/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./configs/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"

  fastapi-rest-sample:
    build:
      context: ./examples/fastapi-rest-otel
      dockerfile: Dockerfile
    depends_on:
      - otel-collector
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: "otel-collector:4317"
      OTEL_SERVICE_NAME: fastapi-rest-sample
      DEPLOYMENT_ENV: docker-compose
    ports:
      - "8080:8000"

  fastapi-rest-sample-loadgen:
    image: locustio/locust:2.31.1
    depends_on:
      - fastapi-rest-sample
    working_dir: /mnt/locust
    volumes:
      - ./examples/fastapi-rest-otel/locustfile.py:/mnt/locust/locustfile.py:ro
    command:
      - -f
      - /mnt/locust/locustfile.py
      - --host
      - http://fastapi-rest-sample:8000
      - --headless
      - --users
      - "15"
      - --spawn-rate
      - "3"

volumes:
  nats-data:
  clickhouse-data:
  grafana-data:
